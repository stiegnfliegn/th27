<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐸 Geschafft!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark:  #3B6D11;
    --green-mid:   #639922;
    --green-light: #EAF3DE;
    --orange:      #EF9F27;
    --orange-dark: #633806;
    --red:         #D85A30;
    --red-dark:    #993C1D;
    --red-light:   #FAECE7;
    --cream:       #FFF8E7;
    --dark:        #1e2a0e;
    --white:       #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background-color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 10% 15%, rgba(99,153,34,.12) 0%, transparent 45%),
      radial-gradient(circle at 90% 80%, rgba(239,159,39,.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 10%, rgba(55,138,221,.1) 0%, transparent 35%);
    pointer-events: none;
    z-index: 0;
  }

  .leaf {
    position: fixed;
    top: -60px;
    pointer-events: none;
    z-index: 0;
    animation: leafFall linear infinite;
    opacity: 0;
  }
  @keyframes leafFall {
    0%   { transform: translateY(0) rotate(0deg) translateX(0px);   opacity: 0; }
    5%   { opacity: .22; }
    90%  { opacity: .18; }
    100% { transform: translateY(110vh) rotate(360deg) translateX(30px); opacity: 0; }
  }

  .confetti-piece {
    position: fixed;
    top: -20px;
    pointer-events: none;
    z-index: 5;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    opacity: 0;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg) translateX(0px);   opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg) translateX(40px); opacity: 0; }
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 1.0rem;
  }

  .card {
    background: rgba(255,255,255,0.35);
    border-radius: 2.5rem;
    padding: 1.0rem 0.8rem 1.2rem;
    max-width: 440px;
    width: 100%;
    min-height: min(88svh, 600px);
    box-shadow: 6px 6px 0 var(--green-dark);
    border: 3px solid var(--green-dark);
    animation: popIn .6s cubic-bezier(.175,.885,.32,1.275);
    display: flex;
    flex-direction: column;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(.85) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .card-top { text-align: center; }

  .card-middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: .8rem;
  }

  .card-bottom { text-align: center; }

  .progress {
    display: flex;
    justify-content: center;
    gap: .5rem;
    margin-bottom: 1.0rem;
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid var(--green-dark);
    background: var(--green-light);
    transition: background .3s;
  }
  .dot.done { background: var(--green-mid); }
  .dot.next {
    background: var(--red);
    transform: scale(1.3);
    border-color: var(--red-dark);
  }

  .success-badge {
    background: var(--green-mid);
    border: 2px solid var(--green-dark);
    border-radius: 2rem;
    padding: .3rem 1rem;
    font-family: 'Fredoka One', cursive;
    font-size: .9rem;
    color: var(--white);
    display: inline-block;
    box-shadow: 2px 2px 0 var(--green-dark);
  }

  .trophy {
    font-size: 4.5rem;
    display: block;
    animation: bounce 1s cubic-bezier(.36,.07,.19,.97) .4s both;
  }
  @keyframes bounce {
    0%   { transform: scale(0) rotate(-15deg); }
    60%  { transform: scale(1.2) rotate(8deg); }
    80%  { transform: scale(.9) rotate(-4deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  h2 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 7vw, 2.4rem);
    color: var(--green-dark);
  }

  .subtitle {
    font-size: 1rem;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.6;
  }

  .weiter-btn {
    display: inline-block;
    width: 100%;
    padding: .85rem 1.8rem;
    border-radius: 2rem;
    border: 3px solid var(--red-dark);
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--red-dark);
    transition: transform .12s, box-shadow .12s;
    background: var(--red);
    color: var(--white);
    text-decoration: none;
  }
  .weiter-btn:active {
    transform: translate(3px, 3px);
    box-shadow: 1px 1px 0 var(--red-dark);
  }
</style>
</head>
<body>

<div class="page">
  <div class="card">

    <div class="card-top">
      <div class="progress">
        <div class="dot done"></div>
        <div class="dot done"></div>
        <div class="dot next"></div>
        <div class="dot"></div>
      </div>
      <div class="success-badge">✅ Rätsel #2 gelöst!</div>
    </div>

    <div class="card-middle">
      <span class="trophy">🔥</span>
      <h2>Zwei down, zwei to go!</h2>
      <p class="subtitle">Kröticole wird langsam nervös.<br>Und das zurecht. 😈🐸</p>
    </div>

    <div class="card-bottom">
      <a class="weiter-btn" href="ratsel3.html?play=1">🐸 Weiter zu Rätsel #3</a>
    </div>

  </div>
</div>

<script>
  const leafEmojis = ['🍃', '🌿', '🍀', '🍃', '🌿'];
  for (let i = 0; i < 18; i++) {
    const leaf = document.createElement('div');
    leaf.className = 'leaf';
    leaf.textContent = leafEmojis[i % leafEmojis.length];
    const dur = 6 + Math.random() * 10;
    leaf.style.left              = (Math.random() * 100) + '%';
    leaf.style.fontSize          = (0.9 + Math.random() * 1.0) + 'rem';
    leaf.style.animationDuration = dur + 's';
    leaf.style.animationDelay    = -(Math.random() * dur) + 's';
    document.body.appendChild(leaf);
  }

  const confettiColors = ['#D85A30','#993C1D','#EF9F27','#639922','#3B6D11','#FAECE7'];
  function spawnConfetti() {
    for (let i = 0; i < 60; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        const size = 6 + Math.random() * 8;
        c.style.left              = (Math.random() * 100) + '%';
        c.style.width             = size + 'px';
        c.style.height            = size * (Math.random() > .5 ? 1 : 2.5) + 'px';
        c.style.background        = confettiColors[Math.floor(Math.random() * confettiColors.length)];
        c.style.borderRadius      = Math.random() > .5 ? '50%' : '2px';
        c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        c.style.animationDelay    = '0s';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * 40);
    }
  }
  spawnConfetti();
  setTimeout(spawnConfetti, 2500);
</script>
</body>
</html>
