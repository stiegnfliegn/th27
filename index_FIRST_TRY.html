<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Der versteckte Schatz</title>

<style>
body{
font-family: Arial;
text-align:center;
padding:40px;
background:#f2f2f2;
}

.box{
background:white;
padding:30px;
border-radius:10px;
max-width:500px;
margin:auto;
}
</style>

</head>

<body>

<div class="box">

<h1>Willkommen. Hier startet dein Abenteuer!</h1>

<p>Wenn du das siehst funktioniert die Website 🙂</p>

<p>Station 1 wartet auf dich.</p>

</div>

<audio id="bgmusic" autoplay loop>
  <source src="00 Intro_compressed.mp3" type="audio/mpeg">
</audio>

<script>

const music = document.getElementById("bgmusic")
music.volume = 0.4

// Versuch Autoplay beim Laden
window.addEventListener("load", () => {
    music.play().catch(() => {})
})

// Fallback: startet beim ersten Tap
document.addEventListener("click", () => {
    music.play()
}, { once: true })

</script>

</body>
</html>
