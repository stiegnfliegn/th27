<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐸 Kröticole — Villain Musical</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#000;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;font-family:'Nunito',sans-serif;}

  .stage{position:relative;width:min(98vw,440px);height:min(80svh,560px);overflow:hidden;border-radius:1.2rem;background:#000;}

  /* ── BACKGROUNDS ── */
  .bg{position:absolute;inset:0;opacity:0;transition:opacity .7s;pointer-events:none;}
  .bg.show{opacity:1;}
  .bg-warning{background:radial-gradient(ellipse at 50% 35%,#2a0000 0%,#000 70%);}
  .bg-forest{background:linear-gradient(180deg,#071204 0%,#0d2206 45%,#1a3a0a 72%,#2d1a06 100%);}
  .bg-stage{background:linear-gradient(180deg,#0d0508 0%,#1a0a10 50%,#2a1505 100%);}
  .bg-smoke{background:linear-gradient(180deg,#080e05 0%,#0f1a08 60%,#1a3a0a 100%);}
  .bg-outro{background:radial-gradient(ellipse at 50% 25%,#120800 0%,#000 65%);}

  /* ── STARS ── */
  .star{position:absolute;border-radius:50%;background:#fff;pointer-events:none;}

  /* ── TREES ── */
  .tree{position:absolute;bottom:0;display:flex;flex-direction:column;align-items:center;pointer-events:none;}
  .tree-top{background:#0d2808;border-radius:50% 50% 40% 40%;}
  .tree-top2{background:#163310;border-radius:50% 50% 40% 40%;margin-top:-12px;}
  .tree-trunk{background:#3d2008;border-radius:3px;}

  /* ── GROUND ── */
  .ground{position:absolute;bottom:0;left:0;right:0;height:62px;background:#2d1a06;pointer-events:none;}
  .grass{position:absolute;bottom:58px;left:0;right:0;height:22px;background:#2d5a0a;border-radius:60% 60% 0 0/80% 80% 0 0;pointer-events:none;}

  /* ── CURTAINS (stage scene) ── */
  .curtain-l,.curtain-r{position:absolute;top:0;bottom:0;width:68px;pointer-events:none;z-index:2;}
  .curtain-l{left:0;background:linear-gradient(90deg,#6b0808,#8b0a0a 60%,transparent);}
  .curtain-r{right:0;background:linear-gradient(270deg,#6b0808,#8b0a0a 60%,transparent);}

  /* ── SPOTLIGHT ── */
  .spotlight{position:absolute;inset:0;pointer-events:none;z-index:3;opacity:0;transition:opacity .6s;}
  .spotlight.show{opacity:1;}

  /* ── GIFT (ground) ── */
  .gift-wrap{position:absolute;bottom:62px;right:55px;width:70px;height:76px;z-index:5;transition:opacity .3s;}
  .g-box{position:absolute;bottom:0;left:0;right:0;height:50px;background:#378ADD;border-radius:4px;border:2.5px solid #185FA5;}
  .g-lid{position:absolute;bottom:47px;left:-4px;right:-4px;height:15px;background:#4D96FF;border-radius:3px;border:2.5px solid #185FA5;}
  .g-rbv{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:11px;height:66px;background:#EF9F27;border-radius:2px;z-index:1;}
  .g-rbh{position:absolute;top:2px;left:-4px;right:-4px;height:11px;background:#EF9F27;border-radius:2px;}
  .g-bl{position:absolute;bottom:59px;left:6px;width:19px;height:14px;background:#EF9F27;border-radius:50% 50% 50% 0;border:2px solid #633806;transform:rotate(-30deg);z-index:2;}
  .g-br{position:absolute;bottom:59px;right:6px;width:19px;height:14px;background:#EF9F27;border-radius:50% 50% 0 50%;border:2px solid #633806;transform:rotate(30deg);z-index:2;}
  .g-glow{position:absolute;bottom:48px;right:38px;width:98px;height:98px;border-radius:50%;background:radial-gradient(circle,rgba(239,159,39,.4) 0%,transparent 70%);animation:glowP 1.2s ease-in-out infinite;z-index:4;pointer-events:none;}
  @keyframes glowP{0%,100%{transform:scale(.9);opacity:.6}50%{transform:scale(1.3);opacity:1}}
  .sparkle{position:absolute;pointer-events:none;animation:sparkA 1.1s ease-in-out infinite;opacity:0;font-size:15px;}
  @keyframes sparkA{0%,100%{opacity:0;transform:scale(.5) rotate(0)}50%{opacity:1;transform:scale(1.4) rotate(180deg)}}

  /* ── DUST CLOUD ── */
  .dust-puff{position:absolute;border-radius:50%;pointer-events:none;animation:dustAnim .9s ease-out forwards;}
  @keyframes dustAnim{0%{opacity:.85;transform:scale(.2)}60%{opacity:.5;transform:scale(1.5)}100%{opacity:0;transform:scale(2.2)}}

  /* ── CONFETTI ── */
  .cf{position:absolute;width:9px;height:9px;border-radius:2px;top:-20px;opacity:0;z-index:6;pointer-events:none;animation:cfFall linear forwards;}
  @keyframes cfFall{0%{opacity:0;transform:translateY(0) rotate(0)}10%{opacity:1}90%{opacity:.8}100%{opacity:0;transform:translateY(600px) rotate(720deg)}}

  /* ── KRÖTICOLE ── */
  .krot{position:absolute;bottom:60px;width:116px;height:196px;z-index:8;opacity:0;}
  /* legs */
  .k-leg{position:absolute;bottom:0;width:20px;height:52px;background:#4a9e2a;border-radius:10px;border:2px solid #2d6a10;transform-origin:top center;}
  .k-leg.l{left:22px;}.k-leg.r{right:22px;}
  .k-foot{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);width:34px;height:13px;background:#4a9e2a;border-radius:50%;border:2px solid #2d6a10;}
  .k-foot::before,.k-foot::after{content:'';position:absolute;width:10px;height:10px;background:#4a9e2a;border-radius:50%;border:1.5px solid #2d6a10;top:-5px;}
  .k-foot::before{left:3px;}.k-foot::after{right:3px;}
  /* body */
  .k-body{position:absolute;bottom:46px;left:50%;transform:translateX(-50%);width:72px;height:82px;background:#4a9e2a;border-radius:50% 50% 45% 45%;border:2.5px solid #2d6a10;}
  .k-belly{position:absolute;bottom:54px;left:50%;transform:translateX(-50%);width:46px;height:58px;background:#a8d878;border-radius:50% 50% 45% 45%;}
  .k-wart{position:absolute;background:#3a8a22;border-radius:50%;border:1px solid #2d6a10;}
  /* arms */
  .k-arm{position:absolute;width:15px;height:52px;background:#4a9e2a;border-radius:8px;border:2px solid #2d6a10;bottom:84px;transform-origin:top center;}
  .k-arm.r{right:7px;height:64px;}
  .k-arm.l{left:7px;}.k-arm.r{right:7px;}
  .k-hand{position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);width:26px;height:18px;background:#4a9e2a;border-radius:50%;border:2px solid #2d6a10;}
  .k-hand::before,.k-hand::after{content:'';position:absolute;width:8px;height:13px;background:#4a9e2a;border-radius:4px;border:1.5px solid #2d6a10;top:-9px;}
  .k-hand::before{left:2px;transform:rotate(-16deg);}.k-hand::after{right:2px;transform:rotate(16deg);}
  /* neck */
  .k-neck{position:absolute;bottom:122px;left:50%;transform:translateX(-50%);width:44px;height:20px;background:#4a9e2a;border-radius:50%;border:2px solid #2d6a10;}
  /* head */
  .k-head-wrap{position:absolute;bottom:132px;left:50%;transform:translateX(-50%);width:88px;height:80px;}
  .k-head{position:absolute;inset:0;background:#4a9e2a;border-radius:50%;border:2.5px solid #2d6a10;overflow:hidden;}
  .k-head img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .k-head-ph{width:100%;height:100%;background:#f5c89a;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#666;text-align:center;line-height:1.4;border-radius:50%;}
  .k-shine{position:absolute;top:7px;left:10px;width:24px;height:16px;background:#5ab830;border-radius:50%;opacity:.32;pointer-events:none;}
  /* eye bumps */
  .k-eye{position:absolute;bottom:208px;width:24px;height:18px;background:#4a9e2a;border-radius:50% 50% 0 0;border:2px solid #2d6a10;border-bottom:none;}
  .k-eye.l{left:20px;}.k-eye.r{right:20px;}
  .k-eye::after{content:'';position:absolute;top:2px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:#fff;border-radius:50%;border:1.5px solid #1a4a08;}
  .k-eye::before{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:6px;height:7px;background:#111;border-radius:50%;z-index:2;}
  /* crown */
  .k-crown{position:absolute;bottom:226px;left:50%;transform:translateX(-50%);opacity:0;transition:opacity .5s;z-index:12;}
  .k-crown.show{opacity:1;}
  /* raised gift */
  .k-gift-up{position:absolute;top:72px;right:-38px;width:44px;height:48px;opacity:0;transition:opacity .3s;transform:rotate(12deg);}
  .k-gift-up.show{opacity:1;}
  .ku-box{position:absolute;bottom:0;left:0;right:0;height:30px;background:#378ADD;border:2px solid #185FA5;border-radius:3px;}
  .ku-lid{position:absolute;bottom:28px;left:-3px;right:-3px;height:10px;background:#4D96FF;border:2px solid #185FA5;border-radius:2px;}
  .ku-rv{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:7px;height:40px;background:#EF9F27;border-radius:2px;z-index:1;}
  .ku-rh{position:absolute;top:1px;left:-3px;right:-3px;height:7px;background:#EF9F27;border-radius:2px;}
  .ku-bl{position:absolute;bottom:35px;left:3px;width:12px;height:9px;background:#EF9F27;border-radius:50% 50% 50% 0;border:1.5px solid #633806;transform:rotate(-30deg);z-index:2;}
  .ku-br{position:absolute;bottom:35px;right:3px;width:12px;height:9px;background:#EF9F27;border-radius:50% 50% 0 50%;border:1.5px solid #633806;transform:rotate(30deg);z-index:2;}

  /* ── CROWD (chorus) ── */
  .crowd{position:absolute;bottom:60px;left:0;right:0;display:flex;justify-content:space-around;padding:0 8px;opacity:0;transition:opacity .5s;z-index:5;}
  .crowd.show{opacity:1;}
  .cf-frog{display:flex;flex-direction:column;align-items:center;position:relative;animation:cfBob .38s ease-in-out infinite alternate;}
  .cf-frog:nth-child(even){animation-direction:alternate-reverse;}
  .cf-frog:nth-child(3n){animation-duration:.32s;}
  @keyframes cfBob{from{transform:translateY(0) rotate(-4deg)}to{transform:translateY(-10px) rotate(4deg)}}
  .cf-head{width:22px;height:20px;background:#1a5008;border-radius:50%;position:relative;}
  .cf-el,.cf-er{position:absolute;top:2px;width:7px;height:6px;background:#0d3004;border-radius:50% 50% 0 0;}
  .cf-el{left:3px;}.cf-er{right:3px;}
  .cf-body{width:20px;height:22px;background:#1a5008;border-radius:40% 40% 35% 35%;margin-top:1px;position:relative;}
  .cf-al,.cf-ar{position:absolute;width:7px;height:13px;background:#1a5008;border-radius:4px;top:2px;}
  .cf-al{left:-6px;transform-origin:top right;animation:cfAL .38s ease-in-out infinite alternate;}
  .cf-ar{right:-6px;transform-origin:top left;animation:cfAR .38s ease-in-out infinite alternate;}
  @keyframes cfAL{from{transform:rotate(-50deg)}to{transform:rotate(15deg)}}
  @keyframes cfAR{from{transform:rotate(50deg)}to{transform:rotate(-15deg)}}

  /* ── OUTRO BIG FACE ── */
  .outro-face{position:absolute;top:95px;left:50%;transform:translateX(-50%);width:260px;height:280px;opacity:0;transition:opacity .8s;z-index:15;overflow:visible;}
  .outro-face.show{opacity:1;}
  .outro-face.flying{animation:outroFlyIn .7s cubic-bezier(.175,.885,.32,1.275) forwards;}
  .outro-face.floating{animation:outroFloat 1.3s ease-in-out infinite alternate;}
  .outro-face.zoomin{animation:outroZoom .4s ease-out forwards;}
  .outro-face.big{animation:outroBig .6s cubic-bezier(.175,.885,.32,1.275) forwards;}
  @keyframes outroFlyIn{
    0%{transform:translateX(-50%) translateY(300px) rotate(-8deg);opacity:0;}
    60%{transform:translateX(-50%) translateY(-18px) rotate(4deg);opacity:1;}
    100%{transform:translateX(-50%) translateY(0) rotate(0deg);opacity:1;}
  }
  @keyframes outroZoom{
    0%{transform:translateX(-50%) translateY(0) scale(1);}
    50%{transform:translateX(-50%) translateY(-8px) scale(1.18);}
    100%{transform:translateX(-50%) translateY(0) scale(1);}
  }
  @keyframes outroBig{
    0%{transform:translateX(-50%) scale(1);}
    100%{transform:translateX(-50%) scale(2.2) translateY(-20px);}
  }
  @keyframes outroPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4)}}
  .outro-face.laugh{animation:outroZoom .4s ease-out,outroFloat 1.3s ease-in-out infinite alternate .4s;}
  .outro-face svg{width:100%;height:100%;}
  @keyframes outroFloat{from{transform:translateX(-50%) translateY(0)}to{transform:translateX(-50%) translateY(-12px)}}
  .outro-face img{display:none;}
  .outro-face-ph{display:none;}
  
  
  /* Outro crowd */
  .outro-crowd{position:absolute;bottom:0;left:0;right:0;height:200px;display:flex;align-items:flex-end;justify-content:space-around;padding:0 4px 62px;opacity:0;transition:opacity .8s;z-index:8;}
  .outro-crowd.show{opacity:1;}
  .oc{display:flex;flex-direction:column;align-items:center;animation:ocBob .36s ease-in-out infinite alternate;}
  .oc:nth-child(even){animation-direction:alternate-reverse;animation-duration:.44s;}
  .oc:nth-child(3n+1){animation-duration:.3s;}
  @keyframes ocBob{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-14px) rotate(5deg)}}
  .oc-h{width:28px;height:25px;background:#1f5a0a;border-radius:50%;position:relative;border:1.5px solid #0d3004;}
  .oc-el,.oc-er{position:absolute;top:2px;width:8px;height:7px;background:#0d3004;border-radius:50% 50% 0 0;}
  .oc-el{left:4px;}.oc-er{right:4px;}
  .oc-b{width:24px;height:30px;background:#1f5a0a;border-radius:40% 40% 35% 35%;margin-top:1px;position:relative;border:1.5px solid #0d3004;}
  .oc-al,.oc-ar{position:absolute;width:8px;height:15px;background:#1f5a0a;border-radius:4px;top:3px;border:1px solid #0d3004;}
  .oc-al{left:-7px;transform-origin:top right;animation:ocAL .36s ease-in-out infinite alternate;}
  .oc-ar{right:-7px;transform-origin:top left;animation:ocAR .36s ease-in-out infinite alternate;}
  @keyframes ocAL{from{transform:rotate(-55deg)}to{transform:rotate(18deg)}}
  @keyframes ocAR{from{transform:rotate(55deg)}to{transform:rotate(-18deg)}}

  /* ── SPEECH BUBBLE ── */
  .bubble{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:#EF9F27;border:3px solid #633806;border-radius:1rem;padding:.35rem 1rem;font-family:'Fredoka One',cursive;font-size:clamp(.85rem,3.5vw,1.08rem);color:#633806;white-space:nowrap;opacity:0;box-shadow:3px 3px 0 #633806;z-index:20;pointer-events:none;transition:opacity .22s;}
  .bubble.show{opacity:1;}
  .bubble::after{content:'';position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);border-width:9px 7px 0;border-style:solid;border-color:#633806 transparent transparent;}

  /* ── SUBTITLE ── */
  .subtitle{position:absolute;bottom:12px;left:8px;right:8px;background:rgba(0,0,0,.78);border-radius:.6rem;padding:.38rem .9rem;font-family:'Nunito',sans-serif;font-size:clamp(.78rem,3vw,.95rem);color:#fff;font-weight:700;text-align:center;opacity:0;transition:opacity .25s;z-index:30;pointer-events:none;line-height:1.4;}
  .subtitle.show{opacity:1;}

  /* ── SIREN ── */
  .siren-scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;opacity:0;transition:opacity .5s;pointer-events:none;z-index:10;}
  .siren-scene.show{opacity:1;}
  .siren-body{width:88px;height:56px;background:#c0392b;border-radius:44px 44px 8px 8px;position:relative;animation:sirenGlow .5s ease-in-out infinite alternate;}
  @keyframes sirenGlow{from{box-shadow:0 0 20px rgba(231,76,60,.4)}to{box-shadow:0 0 70px rgba(231,76,60,.95)}}
  .siren-light{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:28px;height:28px;background:#ff6b6b;border-radius:50%;animation:sirenFlash .5s ease-in-out infinite alternate;}
  @keyframes sirenFlash{from{background:#c0392b;box-shadow:0 0 8px rgba(231,76,60,.3)}to{background:#ff9999;box-shadow:0 0 36px rgba(255,107,107,.9)}}
  .siren-base{position:absolute;bottom:-10px;left:8px;right:8px;height:10px;background:#777;border-radius:0 0 5px 5px;}
  .siren-ray{position:absolute;top:0;left:50%;width:4px;transform-origin:bottom center;opacity:0;animation:rayPulse .5s ease-in-out infinite alternate;}
  @keyframes rayPulse{from{opacity:0}to{opacity:.45}}
  .achtung{font-family:'Fredoka One',cursive;font-size:clamp(3rem,12vw,5rem);color:#EF9F27;text-shadow:4px 4px 0 #633806,0 0 50px rgba(239,159,39,.7);letter-spacing:.08em;transform:scale(.75);opacity:0;transition:transform .45s cubic-bezier(.175,.885,.32,1.275),opacity .4s;}
  .achtung.pop{transform:scale(1);opacity:1;}
  .achtung-sub{font-family:'Fredoka One',cursive;font-size:clamp(.9rem,3.5vw,1.15rem);color:#fff;opacity:0;transition:opacity .5s .3s;text-align:center;padding:0 1rem;}
  .achtung-sub.show{opacity:1;}




  /* Choir frogs — 3 per side sliding in */
  .cf-singer{position:absolute;z-index:14;pointer-events:none;transition:transform .6s cubic-bezier(.175,.885,.32,1.275), opacity .4s;}
  .cf-singer.left{left:-80px;transform:translateX(0);}
  .cf-singer.right{right:-80px;transform:translateX(0);}
  .cf-singer.show.left{transform:translateX(75px);}
  .cf-singer.show.right{transform:translateX(-75px);}
  @keyframes singerBob{from{transform:translateX(75px) translateY(0) rotate(-5deg)}to{transform:translateX(75px) translateY(-8px) rotate(5deg)}}
  @keyframes singerBobR{from{transform:translateX(-75px) translateY(0) rotate(5deg)}to{transform:translateX(-75px) translateY(-8px) rotate(-5deg)}}
  .cf-singer.show.left{animation:singerBob .45s ease-in-out infinite alternate;}
  .cf-singer.show.right{animation:singerBobR .45s ease-in-out infinite alternate;}
  .cf-singer:nth-child(2){animation-delay:.15s;}
  .cf-singer:nth-child(3){animation-delay:.3s;}
  /* Glitter particles */
  .glitter{position:absolute;border-radius:50%;pointer-events:none;animation:glitterAnim linear forwards;}
  @keyframes glitterAnim{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--gx),var(--gy)) scale(.2)}}
  /* ── FLASH / OVERLAY ── */
  .flash{position:absolute;inset:0;background:#EF9F27;opacity:0;z-index:40;pointer-events:none;border-radius:1.2rem;}
  .overlay{position:absolute;inset:0;background:#000;z-index:50;opacity:1;pointer-events:none;border-radius:1.2rem;transition:opacity .6s;}
  .overlay.clear{opacity:0;}

  /* ── START BTN ── */
  .start-btn{margin-top:1.2rem;padding:.85rem 3rem;border-radius:2rem;border:3px solid #2d6a10;font-family:'Fredoka One',cursive;font-size:1.2rem;cursor:pointer;background:#639922;color:#fff;box-shadow:4px 4px 0 #2d6a10;display:none;z-index:1;}
  .start-btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #2d6a10;}
</style>
</head>
<body>

<div class="stage" id="stage">

  <!-- Backgrounds -->
  <div class="bg bg-warning" id="bgW"></div>
  <div class="bg bg-forest"  id="bgF"></div>
  <div class="bg bg-stage"   id="bgS"></div>
  <div class="bg bg-smoke"   id="bgSm"></div>
  <div class="bg bg-outro"   id="bgO"></div>

  <!-- Stars (forest + outro) -->
  <div class="star" style="width:3px;height:3px;top:6%;left:18%;opacity:.7;"></div>
  <div class="star" style="width:2px;height:2px;top:12%;left:42%;opacity:.5;"></div>
  <div class="star" style="width:3px;height:3px;top:5%;left:68%;opacity:.6;"></div>
  <div class="star" style="width:2px;height:2px;top:16%;left:82%;opacity:.4;"></div>
  <div class="star" style="width:2px;height:2px;top:9%;left:55%;opacity:.5;"></div>
  <div class="star" style="width:3px;height:3px;top:20%;left:28%;opacity:.45;"></div>

  <!-- Trees -->
  <div class="tree" style="left:0;z-index:1;" id="treeL">
    <div class="tree-top"  style="width:62px;height:68px;"></div>
    <div class="tree-top2" style="width:74px;height:80px;"></div>
    <div class="tree-trunk" style="width:16px;height:55px;"></div>
  </div>
  <div class="tree" style="right:0;z-index:1;" id="treeR">
    <div class="tree-top"  style="width:58px;height:64px;"></div>
    <div class="tree-top2" style="width:70px;height:75px;"></div>
    <div class="tree-trunk" style="width:16px;height:52px;"></div>
  </div>
  <div class="tree" style="left:55px;z-index:1;">
    <div class="tree-top"  style="width:44px;height:52px;background:#081f05;"></div>
    <div class="tree-top2" style="width:54px;height:62px;background:#0d2808;"></div>
    <div class="tree-trunk" style="width:12px;height:44px;"></div>
  </div>
  <div class="tree" style="right:55px;z-index:1;">
    <div class="tree-top"  style="width:42px;height:50px;background:#081f05;"></div>
    <div class="tree-top2" style="width:52px;height:60px;background:#0d2808;"></div>
    <div class="tree-trunk" style="width:12px;height:42px;"></div>
  </div>

  <!-- Stage curtains -->
  <div class="curtain-l" id="curtL" style="opacity:0;transition:opacity .5s;"></div>

  </div>

  <!-- Speech bubble -->
  <div class="bubble" id="bubble">!</div>

  <!-- Subtitle -->
  <div class="subtitle" id="subtitle"></div>

  <div class="flash"   id="flash"></div>
  <div class="overlay" id="overlay"></div>
</div>

<button class="start-btn" id="startBtn" onclick="window.location.href='index3.html'">🐾 Los geht's!</button>
<audio id="song" src="Audio_Intro_Kroticole_Song.mp3"></audio>

<script>
document.head.insertAdjacentHTML('beforeend',`<style>
  @keyframes legSneak  {from{transform:rotate(-9deg)} to{transform:rotate(13deg)}}
  @keyframes armSneak  {from{transform:rotate(-13deg)}to{transform:rotate(9deg)}}
  @keyframes legMarch  {from{transform:rotate(-29deg)}to{transform:rotate(29deg)}}
  @keyframes armMarch  {from{transform:rotate(-39deg)}to{transform:rotate(39deg)}}
  @keyframes legSprint {from{transform:rotate(-45deg)}to{transform:rotate(45deg)}}
  @keyframes armSprint {from{transform:rotate(-55deg)}to{transform:rotate(55deg)}}
  @keyframes legDance  {from{transform:rotate(-34deg)}to{transform:rotate(34deg)}}
  @keyframes armDance  {from{transform:rotate(-58deg)}to{transform:rotate(58deg)}}
  @keyframes legPoint  {from{transform:rotate(-6deg)} to{transform:rotate(6deg)}}
  @keyframes krotBob   {from{transform:translateY(0) rotate(-2deg)}to{transform:translateY(-11px) rotate(2deg)}}
  @keyframes krotShake {0%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}100%{transform:translateX(0)}}
  @keyframes krotSpin {0%{transform:scaleX(1) rotate(0deg)}25%{transform:scaleX(-1) rotate(0deg)}50%{transform:scaleX(1) rotate(0deg)}75%{transform:scaleX(-1) rotate(0deg)}100%{transform:scaleX(1) rotate(0deg)}}
</style>`);

const $=id=>document.getElementById(id);
const song=$('song'),overlay=$('overlay'),flash=$('flash'),krot=$('krot');
const armL=$('armL'),armR=$('armR'),legL=$('legL'),legR=$('legR');
const bubble=$('bubble'),subtitle=$('subtitle');
const gift=$('gift'),kGift=$('kGift'),kCrown=$('kCrown');
const crowd=$('crowd'),outroFace=$('outroFace'),outroCrowd=$('outroCrowd');
const outroCrown=$('outroCrown'),spotlight=$('spotlight');
const startBtn=$('startBtn');

let timers=[];
const at=(ms,fn)=>timers.push(setTimeout(fn,ms));

// SRT subtitles exact
const subs=[

  {s:7003, e:12000,t:'Heute ist ein großer Tag, doch ich hab zugeschlagen.'},
  {s:12094,e:17993,t:'Dein Geschenk ist weg und du kannst nur noch klagen.'},
  {s:18088,e:24000,t:'Kröticole, die Kröte, ich lach dir ins Gesicht.'},
  {s:24095,e:28997,t:'Du suchst überall, doch findest mich nicht.'},
  {s:29091,e:35004,t:'Kröticole! Kröticole! Die Kröte Nummer eins!'},
  {s:35098,e:40997,t:'Kröticole! Kröticole! Das Geschenk ist jetzt meins!'},
  {s:41091,e:45994,t:'Kröticole! Kröticole! Fang mich doch, wenn du kannst!'},
  {s:46088,e:52001,t:'Kröticole! Kröticole! Zu langsam — keine Chance!'},
  {s:52095,e:56499,t:'Kröticole! Kröticole! MUAHAHAHAHA! 😈'},
  {s:57994,e:62506,t:'Kröticole! Kröticole! MUAHAHAHAHA! 😈'},
  {s:63004,e:67502,t:'Kröticole! Kröticole! MUAHAHAHAHA! 😈'},
  {s:68997,e:72607,t:'Kröticole! Kröticole! MUAHAHAHAHA! 😈'},
];

function showSubs(){
  subs.forEach(s=>{
    at(s.s,()=>{subtitle.textContent=s.t;subtitle.classList.add('show');});
    at(s.e,()=>subtitle.classList.remove('show'));
  });
}

// helpers
function showBg(id){
  ['bgW','bgF','bgS','bgSm','bgO'].forEach(b=>$(b).classList.remove('show'));
  $(id).classList.add('show');
}

function teleport(left){
  krot.style.transition='none';
  krot.style.animation='';
  krot.style.transform='';
  krot.style.opacity='0';
  krot.style.left=left;
  krot.offsetLeft;
}
function appear(){krot.style.opacity='1';}

function walk(type,speed){
  const d=speed+'s';
  const m={sneak:['legSneak','armSneak'],march:['legMarch','armMarch'],
           sprint:['legSprint','armSprint'],dance:['legDance','armDance'],point:['legPoint','legPoint']};
  const [l,a]=m[type]||['',''];
  legL.style.animation=l?`${l} ${d} ease-in-out infinite alternate`:'';
  legR.style.animation=l?`${l} ${d} ease-in-out infinite alternate reverse`:'';
  armL.style.animation=a?`${a} ${d} ease-in-out infinite alternate`:'';
  armR.style.animation=a?`${a} ${d} ease-in-out infinite alternate reverse`:'';
}
function stopAll(){walk('none',0);krot.style.animation='';krot.style.transform='';}
function moveTo(left,dur,ease){krot.style.transition=`left ${dur}s ${ease||'linear'}`;krot.style.left=left;}

function showBubble(txt,dur){
  bubble.textContent=txt;bubble.classList.add('show');
  at(dur,()=>bubble.classList.remove('show'));
}

function doFlash(){
  flash.style.transition='none';flash.style.opacity='.72';flash.offsetLeft;
  flash.style.transition='opacity .32s';flash.style.opacity='0';
}

function confetti(n){
  const colors=['#EF9F27','#4a9e2a','#378ADD','#ff6b9d','#fff','#c77dff','#ffdd44'];
  for(let i=0;i<(n||20);i++){
    const c=document.createElement('div');
    c.className='cf';
    c.style.left=(Math.random()*100)+'%';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(1.3+Math.random()*2.2)+'s';
    c.style.animationDelay=(Math.random()*.9)+'s';
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    $('stage').appendChild(c);
    setTimeout(()=>c.remove(),4500);
  }
}

function spawnDust(){
  const cx=parseInt(krot.style.left)||160;
  for(let i=0;i<8;i++){
    const d=document.createElement('div');
    d.className='dust-puff';
    const sz=28+Math.random()*50;
    d.style.cssText=`width:${sz}px;height:${sz}px;background:rgba(${180+Math.random()*40|0},${160+Math.random()*30|0},${100+Math.random()*30|0},.58);left:${cx+(Math.random()-.5)*80}px;top:${160+(Math.random()-.5)*60}px;animation-delay:${Math.random()*.25}s;z-index:9;`;
    $('stage').appendChild(d);
    setTimeout(()=>d.remove(),1200);
  }
}

// ── MAIN SHOW ──────────────────────────────────────────
function showChoir(){
  const ids=['cL1','cL2','cL3','cR1','cR2','cR3'];
  ids.forEach((id,i)=>{
    setTimeout(()=>{
      const el=document.getElementById(id);
      if(el) el.classList.add('show');
    }, i*80);
  });
  // No auto-hideChoir — handled manually in runShow
}
function hideChoir(){
  ['cL1','cL2','cL3','cR1','cR2','cR3'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.remove('show');
  });
}
function spawnGlitter(){
  const stage=$('stage');
  const positions=[
    {x:70,y:80},{x:70,y:210},{x:70,y:340},
    {x:370,y:80},{x:370,y:210},{x:370,y:340}
  ];
  positions.forEach(pos=>{
    for(let i=0;i<6;i++){
      const g=document.createElement('div');
      g.className='glitter';
      const size=3+Math.random()*5;
      const angle=Math.random()*Math.PI*2;
      const dist=20+Math.random()*35;
      const gx=Math.cos(angle)*dist;
      const gy=Math.sin(angle)*dist - 15;
      g.style.cssText=`width:${size}px;height:${size}px;background:#EF9F27;left:${pos.x+(Math.random()-0.5)*10}px;top:${pos.y}px;--gx:${gx}px;--gy:${gy}px;animation-duration:${0.6+Math.random()*0.5}s;animation-delay:${Math.random()*0.3}s;z-index:25;box-shadow:0 0 3px #EF9F27;`;
      stage.appendChild(g);
      setTimeout(()=>g.remove(), 1200);
    }
  });
}
function runShow(){
  showSubs();
  song.play().catch(()=>{});

  // 0:00 — ACHTUNG siren
  at(0,()=>{
    overlay.classList.add('clear');
    showBg('bgW');
    $('sirenScene').classList.add('show');
    gift.style.opacity='0';
  });
  at(500,()=>$('achtung').classList.add('pop'));
  at(1200,()=>$('achtungSub').classList.add('show'));

  // 0:07 — Sneak into forest, approach gift
  at(6400,()=>{
    $('sirenScene').classList.remove('show');
    showBg('bgF');
    gift.style.opacity='1';
    teleport('-130px');
  });
  at(6700,()=>{
    appear();
    walk('sneak',.54);
    krot.style.transform='scaleY(.86)';
    moveTo('calc(100% - 190px)',3.5,'linear');
  });

  // 0:12 — Grab gift
  at(12094,()=>{
    stopAll();
    krot.style.transition='transform .22s';
    krot.style.transform='scaleY(1)';
    armR.style.animation='';
    armR.style.transition='transform .28s';
    armR.style.transform='rotate(-118deg)';
    doFlash();
  });
  at(12550,()=>{
    gift.style.opacity='0';
    kGift.classList.add('show');
    armR.style.transform='rotate(-25deg)';
  });
  at(13100,()=>{
    armR.style.transition='';armR.style.transform='';
    walk('march',.34);
    krot.style.animation='krotBob .34s ease-in-out infinite alternate';
    showBubble('Das Geschenk ist MEINS! 🐸',2600);
  });

  // 0:18 — Taunt viewer — move to center, point at screen
  at(17800,()=>{
    stopAll();
    kGift.classList.remove('show');
    teleport('calc(50% - 58px)');
    showBg('bgS');
    $('curtL').style.opacity='1';
    $('curtR').style.opacity='1';
    spotlight.classList.add('show');
  });
  at(18588,()=>{
    appear();
    // Scale up — bigger in frame, laughing pose
    krot.style.transition='transform .35s cubic-bezier(.175,.885,.32,1.275)';
    krot.style.transform='scale(1.55) translateY(-18px)';
    // Both arms spread wide — laughing at viewer
    armL.style.animation='';
    armR.style.animation='';
    armL.style.transition='transform .3s';
    armR.style.transition='transform .3s';
    armL.style.transform='rotate(-95deg)';
    armR.style.transform='rotate(95deg)';
    showBubble('HAHAHA! Du findest mich NIE! 😈', 5500);
  });
  // Laughing shake while big
  at(18700,()=>{krot.style.transition='transform .16s';krot.style.transform='scale(1.55) translateY(-18px) rotate(-4deg)';});
  at(18950,()=>{krot.style.transform='scale(1.55) translateY(-18px) rotate(4deg)';});
  at(19200,()=>{krot.style.transform='scale(1.55) translateY(-18px) rotate(-3deg)';});
  at(19450,()=>{krot.style.transform='scale(1.55) translateY(-18px) rotate(3deg)';});
  at(19700,()=>{krot.style.transform='scale(1.55) translateY(-18px) rotate(-2deg)';});
  at(19950,()=>{krot.style.transform='scale(1.55) translateY(-18px) rotate(0)';});
  at(20200,()=>{krot.style.transform='scale(1.55) translateY(-18px) rotate(-3deg)';});
  at(20500,()=>{krot.style.transform='scale(1.55) translateY(-18px) rotate(3deg)';});
  at(20800,()=>{krot.style.transform='scale(1.55) translateY(-18px) rotate(0)';});

  // 0:24 — Disappear in smoke
  at(25800,()=>{
    stopAll();
    armL.style.transform='';armL.style.transition='';
    spawnDust();
    krot.style.transition='opacity .18s';
    krot.style.opacity='0';
    showBg('bgSm');
    $('curtL').style.opacity='0';
    $('curtR').style.opacity='0';
    spotlight.classList.remove('show');
    gift.style.opacity='0';
    showBubble('Du findest mich NICHT! 💨🐸',3500);
  });

  // ── CHORUS VERSION D — 4 distinct passes ──────────────────────────────

  // PASS 1 (0:29): March triumphant L→R with crown + gift + crowd
  at(28700,()=>{
    kGift.classList.add('show');
    kCrown.classList.add('show');
    crowd.classList.add('show');
    showBg('bgF');
    confetti(26);
    teleport('-130px');
    krot.style.bottom='60px';
  });
  at(29091,()=>{
    appear();
    walk('march',.3);
    krot.style.animation='krotBob .3s ease-in-out infinite alternate';
    moveTo('calc(100% + 22px)',5.5,'linear');
    showBubble('Kröticole Nummer Eins! 👑',3200);
  });
  at(30500,()=>confetti(18));

  // PASS 2 (0:35): Drop from above — lands with dust cloud, dances on spot
  at(34800,()=>{
    stopAll();
    // Teleport to top center, invisible
    krot.style.transition='none';
    krot.style.animation='';
    krot.style.opacity='0';
    krot.style.left='calc(50% - 58px)';
    krot.style.bottom='auto';
    krot.style.top='-200px';
    krot.offsetLeft;
  });
  at(35098,()=>{
    // Drop down
    appear();
    krot.style.transition='top .55s cubic-bezier(.3,0,.6,1.4)';
    krot.style.top='calc(100% - 320px)';
    showBubble('Das Geschenk ist jetzt MEINS! 😈',3000);
  });
  at(35650,()=>{
    // Land — spawn dust, shake
    spawnDust();
    krot.style.transition='transform .12s';
    krot.style.transform='scale(1.15) scaleY(.85)';
    confetti(20);
  });
  at(35800,()=>{ krot.style.transform='scale(1)'; });
  at(36000,()=>{
    // Dance on spot
    walk('dance',.28);
    krot.style.animation='krotBob .28s ease-in-out infinite alternate';
  });
  at(39800,()=>{
    // Jump back up off screen
    stopAll();
    krot.style.transition='top .4s ease-in';
    krot.style.top='-200px';
    krot.style.opacity='1';
  });
  at(40200,()=>{ krot.style.opacity='0'; });

  // PASS 3 (0:41): Sprint RIGHT→LEFT (mirrored!)
  at(40600,()=>{
    stopAll();
    krot.style.transition='none';
    krot.style.animation='';
    krot.style.transform='scaleX(-1)'; // mirror
    krot.style.opacity='0';
    krot.style.top='auto';
    krot.style.bottom='60px';
    krot.style.left='calc(100% + 22px)';
    krot.offsetLeft;
  });
  at(41091,()=>{
    appear();
    walk('march',.3);
    krot.style.animation='krotBob .3s ease-in-out infinite alternate';
    moveTo('-130px',5.5,'linear');
    showBubble('Fang mich doch! 😝',3000);
  });

  // Pass 3 end: wait until fully off screen left, then reset
  at(46700,()=>{
    stopAll();
    krot.style.transition='none';
    krot.style.animation='';
    krot.style.transform='scaleX(1)';
    krot.style.opacity='0';
    krot.offsetLeft;
  });

  // PASS 4 (0:46): Teleport to center, spin dancing, confetti explosion
  at(46700,()=>{
    stopAll();
    krot.style.transition='none';
    krot.style.animation='';
    krot.style.transform='scaleX(1)';
    krot.style.opacity='0';
    krot.style.left='calc(50% - 58px)';
    krot.style.bottom='60px';
    krot.style.top='auto';
    krot.offsetLeft;
  });
  at(46900,()=>{
    appear();
    walk('dance',.25);
    krot.style.animation='krotSpin .55s ease-in-out infinite, krotBob .25s ease-in-out infinite alternate';
    showBubble('Zu langsam — KEINE CHANCE! 🐸',5500);
    confetti(35);
  });
  at(47800,()=>confetti(25));
  at(49000,()=>confetti(25));
  at(50200,()=>confetti(20));

  // 0:52 — OUTRO: choir first, face second, alternating 4x each
  at(52300,()=>{
    stopAll();
    krot.style.opacity='0';
    crowd.classList.remove('show');
    kCrown.classList.remove('show');
    showBg('bgO');
    outroCrowd.classList.add('show');
    // Make sure face+crown start hidden
    outroFace.classList.remove('show','flying','floating','laugh','big');
    outroFace.style.opacity='';
    outroCrown.style.opacity='0';
  });

  // CHOIR 1 (52595): slides in, shown until 55795
  at(52595,()=>{
    showChoir(); spawnGlitter();
    doFlash(); confetti(20);
  });

  // FACE 1 (55795): choir out, face flies in
  // FIX BUG 3: no inline opacity — let CSS class control it
  at(55795,()=>{
    hideChoir();
    outroFace.style.opacity='';                              // clear any inline style
    outroFace.classList.remove('floating','laugh','big');
    outroFace.offsetWidth;                                   // force reflow
    outroFace.classList.add('show','flying');
    outroCrown.style.opacity='1';
    doFlash(); confetti(25);
    showBubble('MUAHAHAHA! 😈🐸', 2800);
  });
  at(56700,()=>{
    outroFace.classList.remove('flying');
    outroFace.classList.add('floating');
  });

  // CHOIR 2 (58494): choir in, face hides, shown until 61694
  // FIX BUG 4+5: explicitly hide face+crown during choir
  at(58494,()=>{
    showChoir(); spawnGlitter();
    outroFace.classList.remove('show','floating','laugh');   // hide face
    outroCrown.style.opacity='0';                           // hide crown
    confetti(18);
  });

  // FACE 2 (61694): choir out, face zooms back in
  at(61694,()=>{
    hideChoir();
    outroFace.style.opacity='';
    outroFace.classList.remove('floating','laugh','big');
    outroFace.offsetWidth;
    outroFace.classList.add('show','laugh');
    outroCrown.style.opacity='1';
    doFlash();
    showBubble('MUAHAHAHA! 😈', 2800);
  });
  at(62300,()=>{
    outroFace.classList.remove('laugh');
    outroFace.classList.add('floating');
  });

  // CHOIR 3 (63504): choir in, face hides, shown until 66704
  at(63504,()=>{
    showChoir(); spawnGlitter();
    outroFace.classList.remove('show','floating','laugh');
    outroCrown.style.opacity='0';
    confetti(18);
  });

  // FACE 3 (66704): choir out, face zooms back in
  at(66704,()=>{
    hideChoir();
    outroFace.style.opacity='';
    outroFace.classList.remove('floating','laugh','big');
    outroFace.offsetWidth;
    outroFace.classList.add('show','laugh');
    outroCrown.style.opacity='1';
    doFlash();
    showBubble('MUAHAHAHA! 🐸🔥', 2800);
  });
  at(67300,()=>{
    outroFace.classList.remove('laugh');
    outroFace.classList.add('floating');
  });

  // CHOIR 4 (69497): choir in, face hides, shown until 72697
  at(69497,()=>{
    showChoir(); spawnGlitter();
    outroFace.classList.remove('show','floating','laugh');
    outroCrown.style.opacity='0';
    confetti(20);
  });

  // FACE 4 (72697): choir out, face goes BIG
  at(72697,()=>{
    hideChoir();
    outroFace.style.opacity='';
    outroFace.classList.remove('floating','laugh');
    outroFace.offsetWidth;
    outroFace.classList.add('show','big');
    doFlash(); confetti(35);
    showBubble('MUAHAHAHA!!! 😈🐸👑', 2500);
  });

  // Fade to black
  at(74000,()=>{
    overlay.style.transition='opacity 3s ease';
    overlay.classList.remove('clear');
  });
  at(77000,()=>{ startBtn.style.display='inline-block'; });
}

window.addEventListener('load',()=>{
  overlay.style.transition='opacity .6s';
  setTimeout(()=>{overlay.classList.add('clear');},200);
  setTimeout(runShow,400);
});
</script>
</body>
</html>
