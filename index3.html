<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐸 Kröticole war hier!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark:   #3B6D11;
    --green-mid:    #639922;
    --green-light:  #EAF3DE;
    --orange:       #EF9F27;
    --orange-dark:  #633806;
    --blue:         #378ADD;
    --blue-light:   #E6F1FB;
    --cream:        #FFF8E7;
    --dark:         #1e2a0e;
    --white:        #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background-color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 10% 15%, rgba(99,153,34,.12) 0%, transparent 45%),
      radial-gradient(circle at 90% 80%, rgba(239,159,39,.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 10%, rgba(55,138,221,.1) 0%, transparent 35%),
      radial-gradient(circle at 20% 85%, rgba(59,109,17,.1) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── BLÄTTERREGEN ── */
  .leaf {
    position: fixed;
    top: -60px;
    pointer-events: none;
    z-index: 0;
    animation: leafFall linear infinite;
    opacity: 0;
  }

  @keyframes leafFall {
    0%   { transform: translateY(0) rotate(0deg) translateX(0px);   opacity: 0; }
    5%   { opacity: .22; }
    90%  { opacity: .18; }
    100% { transform: translateY(110vh) rotate(360deg) translateX(30px); opacity: 0; }
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 1.2rem 1.5rem 2rem;
    text-align: center;
  }

  .card {
    background: rgba(255,255,255,0.35);
    border-radius: 2.5rem;
    padding: 2.5rem 2rem 2rem;
    max-width: 440px;
    width: 100%;
    box-shadow: 6px 6px 0 var(--green-dark);
    border: 3px solid var(--green-dark);
    animation: popIn .6s cubic-bezier(.175,.885,.32,1.275);
    position: relative;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(.85) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .wanted-banner {
    background: var(--orange);
    border: 3px solid var(--orange-dark);
    border-radius: 1rem;
    padding: .4rem 1.2rem;
    font-family: 'Fredoka One', cursive;
    font-size: .95rem;
    color: var(--orange-dark);
    display: inline-block;
    margin-bottom: 1.2rem;
    box-shadow: 3px 3px 0 var(--orange-dark);
    letter-spacing: .05em;
  }

  .kroticole-img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid var(--green-dark);
    box-shadow: 4px 4px 0 var(--green-dark);
    object-fit: cover;
    background: var(--green-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.2rem;
    font-size: 3.5rem;
    overflow: hidden;
  }

  .kroticole-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .kroticole-img.placeholder::after {
    content: '🐸';
    font-size: 4rem;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 7vw, 2.6rem);
    color: var(--green-dark);
    line-height: 1.15;
    margin-bottom: .5rem;
  }

  h1 .name { color: var(--orange-dark); }

  .intro-text {
    font-size: 1rem;
    color: #555;
    line-height: 1.65;
    margin-bottom: 1.4rem;
  }

  .stolen-note {
    background: var(--green-light);
    border: 2px dashed var(--green-mid);
    border-radius: 1rem;
    padding: 1rem 1.2rem;
    font-size: .95rem;
    color: var(--green-dark);
    font-weight: 700;
    margin-bottom: 1.5rem;
    text-align: left;
    line-height: 1.6;
  }

  .stolen-note .author {
    margin-top: .5rem;
    font-size: .85rem;
    color: var(--green-mid);
    font-style: italic;
  }

  .btn {
    display: inline-block;
    padding: .9rem 2.2rem;
    border-radius: 2rem;
    border: 3px solid var(--green-dark);
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--green-dark);
    transition: transform .12s, box-shadow .12s;
    text-decoration: none;
    color: var(--white);
    background: var(--green-mid);
  }

  .btn:active {
    transform: translate(3px, 3px);
    box-shadow: 1px 1px 0 var(--green-dark);
  }
</style>
</head>
<body>

<div class="page">
  <div class="card">

    <div class="wanted-banner">⚠️ ACHTUNG: DIEB AUF DER FLUCHT ⚠️</div>

    <h1>Sei gegrüßt,<br><span class="name">Romi!</span></h1>

    <p class="intro-text">
      Heute ist dein besonderer Tag — aber jemand hat sich gedacht,
      ihn etwas <em>anders</em> zu gestalten als geplant…
    </p>

    <div class="kroticole-img" id="kroticole-wrap">
      <img src="Bild_Kroticole_Test.jpg" alt="Kröticole" onerror="this.style.display='none'">
    </div>

    <div class="stolen-note">
      "Ich habe dein Geschenk geklaut.<br>
      Du wirst es <strong>NIEMALS</strong> finden!<br>
      MUAHAHAHA!!! 😈🐸"
      <div class="author">— Kröticole, Geschenkediebin Nr. 1</div>
    </div>

    <a href="ratsel1_7894.html" class="btn">Nimm die Verfolgung auf!</a>

  </div>
</div>

<!--audio id="bg-music" loop>
  <source src="Audio_Intro_Kroticole_Song.mp3" type="audio/mpeg">
</audio-->

<script>
  // ── BLÄTTERREGEN ─────────────────────────────────
  const leafEmojis = ['🍃', '🌿', '🍀', '🍃', '🌿'];
  const leafCount  = 18;

  for (let i = 0; i < leafCount; i++) {
    const leaf = document.createElement('div');
    leaf.className = 'leaf';
    leaf.textContent = leafEmojis[i % leafEmojis.length];

    const left     = Math.random() * 100;
    const duration = 6 + Math.random() * 10;
    const delay    = -(Math.random() * duration);
    const size     = 0.9 + Math.random() * 1.0;

    leaf.style.left               = left + '%';
    leaf.style.fontSize           = size + 'rem';
    leaf.style.animationDuration  = duration + 's';
    leaf.style.animationDelay     = delay + 's';

    document.body.appendChild(leaf);
  }

  // ── MUSIK ─────────────────────────────────────────
  const music = document.getElementById('bg-music');
music.volume = 0.4;

if (new URLSearchParams(window.location.search).get('play') === '1') {
  music.play().catch(() => {});
} else {
  music.play().catch(() => {
    const unlock = () => {
      music.play();
      document.removeEventListener('click', unlock);
      document.removeEventListener('touchstart', unlock);
    };
    document.addEventListener('click', unlock);
    document.addEventListener('touchstart', unlock);
  });
}
</script>
</body>
</html>
